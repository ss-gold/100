<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>연시은 보아라</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="intro" class="screen active">
    <img id="closedEnvelope" src="https://i.imgur.com/jrYR7UI.png" alt="편지봉투" />
  </main>

  <section id="letter" class="screen">
    <div class="letter-stage">
      <img class="open-envelope" src="https://i.imgur.com/Ln5MVpU.png" alt="열린 편지봉투" />
      <article class="paper"><div id="ransomText"></div></article>
      <button id="startButton">시작하기</button>
    </div>
  </section>

  <section id="study" class="screen">
    <div class="room-wrap">
      <div id="studyMap" class="map-frame">
        <img class="map-img" src="images/study.png" alt="서재" />
        <button class="map-hit-layer" data-room="study" aria-label="서재 조사"></button>
      </div>
    </div>
  </section>

  <section id="room2" class="screen">
    <div class="room-wrap">
      <div id="room2Map" class="map-frame">
        <img id="room2Visible" class="map-img" src="https://i.imgur.com/U8BGGap.png" alt="두 번째 방" />
        <button class="map-hit-layer" data-room="room2" aria-label="두 번째 방 조사"></button>
      </div>
    </div>
  </section>

  <section id="final" class="screen">
    <article class="letter-page">
      <h1>편지</h1>
      <div id="letterContent"></div>
    </article>
  </section>

  <button id="inventoryButton" class="fixed-button">인벤토리</button>
  <button id="backButton" class="fixed-button">서재로 이동</button>
  <button id="musicButton" class="fixed-button">일시정지</button>
  <audio id="bgm" preload="auto"></audio>

  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal">
      <h2 id="modalTitle"></h2>
      <p id="modalText"></p>
      <div id="modalExtra"></div>
      <div id="modalMessage" class="modal-message"></div>
      <div id="modalActions" class="modal-actions"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
